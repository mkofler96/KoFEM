name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - run: cargo install wasm-pack --locked
      - run: wasm-pack build crates/kofem-wasm --target web --out-dir ../../web/src/wasm/pkg
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: cd web && bun install
      - run: cd web && bun run typecheck
      - run: cd web && bun run build
      - run: cd web && bunx playwright install --with-deps chromium
      - run: cd web && bun run test
      - run: cd web && bun scripts/generate-mesh-report.ts
      - run: cd web && bun run upload:slack screenshots/step-fit-view.png screenshots/mesh-report.pdf --comment="KoFEM CI — screenshot + mesh capabilities report"
