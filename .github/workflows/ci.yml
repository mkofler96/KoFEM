  wasm:
    name: WASM (Emscripten)
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mkofler96/kofem-dependencies:buildcache

    steps:
      - uses: actions/checkout@v4

      # CMake stores absolute EMSDK paths in CMakeCache.txt and breaks across runs
      - name: Clean stale CMake cache
        run: |
          rm -f target/wasm-build/CMakeCache.txt
          rm -rf target/wasm-build/CMakeFiles

      - name: Build WASM engine
        run: |
          export OCCT_WASM_ROOT=/cache/occt
          export NETGEN_WASM_ROOT=/cache/netgen-pic
          export MFEM_WASM_ROOT=/cache/mfem-pic
          bash scripts/build-wasm.sh

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kofem-wasm-pkg
          retention-days: 7
          path: |
            web/src/wasm/pkg/kofem_wasm_emcc.js
            web/src/wasm/pkg/kofem_wasm.wasm