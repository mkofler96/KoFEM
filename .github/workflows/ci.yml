name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}

jobs:
  rust:
    name: Rust (native)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install native C++ libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libocct-data-exchange-dev \
            libocct-foundation-dev \
            libocct-modeling-algorithms-dev \
            libocct-modeling-data-dev \
            netgen-headers \
            libnglib-dev \
            libmfem-dev \
            libhypre-dev \
            libopenmpi-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        # Netgen and MFEM have non-thread-safe global state; run all tests single-threaded.
        run: cargo test --workspace --exclude kofem-wasm -- --test-threads=1 --nocapture

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('web/bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - run: cd web && bun install
      - run: cd web && bun run typecheck
      - run: cd web && bun run build
      - run: cd web && bunx playwright install --with-deps chromium
      - run: cd web && bun run test

      - name: Post mesh report to Slack
        if: always()
        run: cd web && bun scripts/generate-mesh-report.ts