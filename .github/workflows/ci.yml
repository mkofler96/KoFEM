name: CI

on:
  push:
    branches: [main, develop, production]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}

jobs:
  rust:
    name: Rust (native)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-rust

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  wasm:
    name: WASM (Emscripten)
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mkofler96/kofem-dependencies:main

    steps:
      - uses: actions/checkout@v4

      # CMake stores absolute EMSDK paths in CMakeCache.txt and breaks across runs
      - name: Cache WASM build output
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            web/src/wasm/pkg/kofem_wasm_emcc.js
            web/src/wasm/pkg/kofem_wasm.wasm
          key: wasm-${{ runner.os }}-${{ hashFiles('engine/**', 'scripts/build-wasm.sh') }}

      - name: WASM cache status
        run: |
          if [ "${{ steps.wasm-cache.outputs.cache-hit }}" = "true" ]; then
            echo "WASM cache HIT — skipping build"
          else
            echo "WASM cache MISS — full build will run"
          fi

      - name: Clean stale CMake cache
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          rm -f target/wasm-build/CMakeCache.txt
          rm -rf target/wasm-build/CMakeFiles

      - name: Build WASM engine
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: bash scripts/build-wasm.sh

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kofem-wasm-pkg
          retention-days: 7
          path: |
            web/src/wasm/pkg/kofem_wasm_emcc.js
            web/src/wasm/pkg/kofem_wasm.wasm

  frontend:
    name: Frontend
    needs: [wasm]
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          # Full history + tags so `git describe --tags` can stamp the image.
          fetch-depth: 0

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: kofem-wasm-pkg
          path: web/src/wasm/pkg/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            web/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install web dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Typecheck
        run: cd web && bun run typecheck

      - name: Build frontend
        run: cd web && bun run build

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd web && bunx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd web && bunx playwright install-deps chromium

      - name: Run frontend tests
        run: cd web && bun run test
        env:
          # Builds the app instrumented with Istanbul so Playwright collects
          # runtime coverage (tests/coverage.ts) — no second test run needed.
          COVERAGE: 1

      # Prints per-file coverage and flags src files never loaded by any test
      # (dead-code candidates).  `if: always()` so a failing test still yields
      # the coverage gathered up to that point.
      - name: Coverage report
        if: always()
        run: cd web && bun run coverage:report

      - name: Report coverage to DeepSource
        if: always()
        run: |
          curl -sSf https://deepsource.io/cli | sh
          sed 's|^SF:|SF:web/|' web/coverage/lcov.info > web/coverage/lcov.deepsource.info
          ./bin/deepsource report --analyzer test-coverage --key javascript \
            --value-file web/coverage/lcov.deepsource.info
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}

      - name: Post mesh report to Slack
        if: always()
        run: cd web && bun scripts/generate-mesh-report.ts

      # --- Docker image -----------------------------------------------------
      # Runs in the frontend job to reuse its checkout. No `if: always()`, so a
      # failing test above skips the build — a broken commit never ships an
      # image. production = build + push to GHCR; every other branch/PR builds
      # only as a smoke test. The image is built map-free in production mode by
      # web/Dockerfile.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/production'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web image (production = push, otherwise build only)
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PREFIX="ghcr.io/${OWNER_LC}"
          VERSION=$(git describe --tags --abbrev=0 || echo 'no-tags-found')
          IMAGE_TAG="${VERSION}-$(git rev-parse --short HEAD)"

          if [ "${GITHUB_REF}" = "refs/heads/production" ]; then
            echo "Production build: pushing images"
            PUSH_FLAG="--push"
            TAG_ARGS="--tag ${IMAGE_PREFIX}/kofem-web:latest \
                      --tag ${IMAGE_PREFIX}/kofem-web:${IMAGE_TAG}"
          else
            echo "Development build: build only, no push"
            PUSH_FLAG=""
            TAG_ARGS=""
          fi

          docker buildx build \
            --platform linux/amd64 \
            --file ./web/Dockerfile \
            --build-arg VITE_GIT_VERSION=${VERSION} \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            $TAG_ARGS \
            $PUSH_FLAG \
            ./web
