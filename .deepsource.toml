version = 1

# Generated artifacts — not hand-written code.  Excluding them keeps analyzers
# from grading generated output and stops the Prettier autofix from expanding
# the minified Emscripten glue (kofem_wasm_emcc.js) into thousands of lines.
exclude_patterns = [
  "web/src/wasm/pkg/**",
  "web/dist/**",
]

[[analyzers]]
name = "test-coverage"
enabled = true

[[analyzers]]
name = "rust"
enabled = true

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.x.x"

[[analyzers]]
name = "cxx"
enabled = true

[[code_formatters]]
name = "rustfmt"
enabled = true

[[code_formatters]]
name = "prettier"
enabled = true

[[code_formatters]]
name = "black"
enabled = true
